          - heading "Televisão aberta perde público em um ano" [level=1] [ref=e69]
          - generic [ref=e70]:
            - time [ref=e72]: 5 de maio de 2023
            - paragraph [ref=e73]: "|"
            - paragraph [ref=e76]: Gustavo Dill
            - paragraph [ref=e77]: "|"
            - time [ref=e79]: 17:02:27
        - generic [ref=e80]:
          - paragraph [ref=e81]:
            - strong [ref=e82]: A televisão aberta sofre com uma queda de rendimento entre seus principais canais, no recorte de janeiro a abril de 2023, e quem mais perdeu público foi a Record TV. O projeto do telepastor Edir Macedo registra uma queda de 16,2% na principal praça do país.
          - paragraph [ref=e83]: Ainda assim, o canal com sede na Barra Funda se manteve na vice liderança ao fechar esse recorte de 119 dias com 4,82 pontos de média, conforme os dados consolidados da Kantar Ibope Media na Grande São Paulo.
          - paragraph [ref=e84]: Primeira colocada, a Globo quase não oscilou e teve 13,47 pontos de média. A rede carioca fecha esse período com uma retração de 0,96% em relação ao ano de 2022. Nos mesmos quatro meses iniciais, a emissora controlada pelos Marinho teve queda de 1,1% em comparação a parcial anterior.
          - paragraph [ref=e85]: A ocupante da medalha de bronze tinha 4,12 pontos no ano passado, dentro desse mesmo recorte. No ano corrente, a rede de Senor Abravanel registra queda de 5,1% no quadro comparativo de um ano para o outro e fica com 3,92 pontos de média.
          - paragraph [ref=e86]: ">> Material elaborado com base nos dados consolidados de Globo, Record TV e SBT nos anos de 2022 e 2023, para demonstrar a queda ocorrida no comparativo entre os períodos."
