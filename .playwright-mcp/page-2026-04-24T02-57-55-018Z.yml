        - heading "1. Aceitação dos Termos" [level=3] [ref=e75]
        - paragraph [ref=e76]: Ao acessar e utilizar o Portal NTVB, você concorda com estes Termos de Uso. Se, por outro lado, não concordar com qualquer parte deste documento, recomendamos que interrompa o uso do site.
        - heading "2. Definições" [level=3] [ref=e77]
