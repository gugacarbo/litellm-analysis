          - listitem [ref=e79]:
            - strong [ref=e80]: “Portal”
            - text: ","
            - strong [ref=e81]: “Site”
            - text: ou
            - strong [ref=e82]: “NTVB”
            - text: referem-se ao website ntvb.com.br e todo o seu conteúdo
          - listitem [ref=e83]:
            - strong [ref=e84]: “Usuário”
            - text: ou
            - strong [ref=e85]: “Você”
            - text: referem-se a qualquer pessoa que acessa o Portal
          - listitem [ref=e86]:
            - strong [ref=e87]: “Conteúdo”
            - text: refere-se a todos os textos, imagens, vídeos e demais materiais publicados no Portal
        - heading "3. Uso do Site e do Conteúdo NTVB" [level=3] [ref=e88]
        - heading "3.1. Permissões de uso" [level=4] [ref=e89]
        - paragraph [ref=e90]: "Você está autorizado a:"
        - list [ref=e91]:
          - listitem [ref=e92]: Antes de tudo, acessar e ler o conteúdo disponibilizado no Portal.
          - listitem [ref=e93]: Além disso, compartilhar links dos artigos em redes sociais e outros meios.
          - listitem [ref=e94]: Por fim, citar pequenos trechos do conteúdo com atribuição e link para a fonte original.
        - heading "3.2. O que não é permitido" [level=4] [ref=e95]
        - list [ref=e96]:
          - listitem [ref=e97]: Copiar, reproduzir, distribuir ou republicar o conteúdo completo sem autorização prévia por escrito
          - listitem [ref=e98]: Também não é permitido utilizar o conteúdo para fins comerciais sem permissão
          - listitem [ref=e99]: Além disso, não é permitido modificar, adaptar ou criar trabalhos derivados do nosso conteúdo
          - listitem [ref=e100]: Da mesma forma, não é permitido utilizar técnicas de scraping, bots ou qualquer método automatizado para extrair dados do site
          - listitem [ref=e101]: Por fim, não é permitido tentar acessar áreas restritas do site sem autorização
          - listitem [ref=e102]: Naturalmente, não é permitido publicar conteúdo ofensivo, ilegal ou spam nos comentários
        - heading "4. Propriedade Intelectual e Uso de Conteúdo NTVB" [level=3] [ref=e103]
        - paragraph [ref=e104]: Todo o conteúdo disponibilizado no Portal NTVB, incluindo textos, imagens, logotipos, design e marca, é de propriedade exclusiva do Portal NTVB ou de seus licenciantes, salvo quando indicado de outra forma.
        - paragraph [ref=e105]: Imagens de emissoras, programas e personalidades são utilizadas sob os princípios de direito de informação jornalística e direitos autorais aplicáveis. Marcas registradas mencionadas pertencem aos seus respectivos proprietários.
        - paragraph [ref=e106]:
          - img "Imagem ilustrativa dos Termos de Uso NTVB" [ref=e107]
        - heading "5. Isenção de Responsabilidade" [level=3] [ref=e108]
        - heading "5.1. Precisão das Informações" [level=4] [ref=e109]
        - paragraph [ref=e110]: "O Portal NTVB empenha-se em fornecer informações precisas e atualizadas. No entanto:"
        - list [ref=e111]:
          - listitem [ref=e112]: Não garantimos a exatidão, completude ou atualidade de todo o conteúdo
          - listitem [ref=e113]: Além disso, informações sobre audiência, contratações e movimentações podem mudar rapidamente
          - listitem [ref=e114]: Por isso, opiniões e análises expressas são de responsabilidade do autor e não representam necessariamente a posição do Portal
        - heading "5.2. Links Externos e Fontes Oficiais" [level=4] [ref=e115]
        - paragraph [ref=e116]:
          - text: Nosso site pode conter links para sites de terceiros. Além disso, consulte também a
          - link "política de conteúdo do Google AdSense" [ref=e117] [cursor=pointer]:
            - /url: https://support.google.com/adsense/answer/48182
          - text: e a
          - link "Lei Geral de Proteção de Dados" [ref=e118] [cursor=pointer]:
            - /url: https://www.planalto.gov.br/ccivil_03/_ato2019-2022/2018/lei/l13709.htm
          - text: para referência.
        - heading "5.3. Disponibilidade do Serviço" [level=4] [ref=e119]
        - paragraph [ref=e120]: Não garantimos que o site estará disponível ininterruptamente ou livre de erros técnicos. Ainda assim, podemos realizar manutenções periódicas sem aviso prévio.
        - heading "6. Comentários e Interação no Portal NTVB" [level=3] [ref=e121]
        - paragraph [ref=e122]: "Ao publicar comentários em nossos artigos:"
        - list [ref=e123]:
          - listitem [ref=e124]: Em primeiro lugar, você é exclusivamente responsável pelo conteúdo que publica
          - listitem [ref=e125]: Além disso, concede ao Portal NTVB licença não exclusiva para usar, reproduzir e distribuir seu comentário
          - listitem [ref=e126]: Da mesma forma, concorda em não publicar conteúdo difamatório, ofensivo, ilegal ou que viole direitos de terceiros
          - listitem [ref=e127]: Por fim, reservamo-nos o direito de remover comentários que violem estas regras sem aviso prévio
        - heading "7. Privacidade e Dados Pessoais" [level=3] [ref=e128]
        - paragraph [ref=e129]:
          - text: O uso de dados pessoais está sujeito à nossa
          - link "Política de Privacidade" [ref=e130] [cursor=pointer]:
            - /url: /politica-de-privacidade/
          - text: ", que faz parte integrante destes Termos de Uso. Assim, recomendamos a leitura dessa página em conjunto com este documento."
        - heading "8. Modificações dos Termos de Uso NTVB" [level=3] [ref=e131]
        - paragraph [ref=e132]: O Portal NTVB reserva-se o direito de modificar estes Termos de Uso a qualquer momento. Quando houver alterações significativas, elas serão notificadas por meio de aviso no site. Dessa forma, o uso continuado do site após modificações constitui aceitação dos novos termos.
        - heading "9. Legislação Aplicável" [level=3] [ref=e133]
        - paragraph [ref=e134]: Estes Termos de Uso são regidos pelas leis da República Federativa do Brasil. Por conseguinte, quaisquer disputas serão submetidas à jurisdição do foro da comarca de São Paulo.
        - heading "10. Contato sobre os Termos de Uso NTVB" [level=3] [ref=e135]
        - paragraph [ref=e136]: "Para questões sobre estes Termos de Uso, entre em contato:"
