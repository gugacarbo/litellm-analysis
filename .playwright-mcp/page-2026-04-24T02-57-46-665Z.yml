        - heading "Sobre Nós no Portal NTVB" [level=3] [ref=e70]
        - paragraph [ref=e71]:
          - text: O
          - strong [ref=e72]: Portal NTVB
          - text: é uma publicação digital independente especializada em cobertura jornalística do mercado de
          - strong [ref=e73]: televisão
          - text: ","
          - strong [ref=e74]: rádio
          - text: e entretenimento brasileiro. Além disso, o projeto nasceu em 2024 da necessidade de oferecer análises mais completas sobre audiência, bastidores e movimentações estratégicas das principais emissoras do país.
        - paragraph [ref=e75]: Nossa equipe editorial é formada por profissionais com experiência em comunicação e jornalismo de entretenimento, comprometidos em investigar, contextualizar e explicar as notícias que impactam o dia a dia dos telespectadores e ouvintes brasileiros. Dessa forma, cada pauta busca unir agilidade, contexto e responsabilidade editorial.
        - heading "Sobre Nós e o Que Fazemos Diferente no Portal NTVB" [level=3] [ref=e76]
        - heading "Análise de audiência de televisão e rádio" [level=4] [ref=e77]
        - paragraph [ref=e78]:
          - text: Além disso, acompanhamos diariamente os índices de audiência das principais emissoras de
          - strong [ref=e79]: televisão
          - text: e
          - strong [ref=e80]: rádio
          - text: (IBOPE/Kantar), explicando tendências, comparações históricas e o que os números realmente significam para o mercado.
        - heading "Bastidor verificado com foco em televisão e rádio" [level=4] [ref=e81]
        - paragraph [ref=e82]: Por outro lado, trazemos informações dos bastidores da TV e do rádio obtidas por meio de fontes próprias e apuração jornalística, sempre com responsabilidade editorial e checagem de fatos. Quando publicamos análises, buscamos ligar cada informação ao contexto do mercado de mídia brasileira.
        - heading "Contextualização do mercado de televisão e rádio" [level=4] [ref=e83]
        - paragraph [ref=e84]: Portanto, não apenas noticiamos o que acontece — explicamos o porquê. Movimentações de apresentadores, mudanças de grade e fusões de emissoras são analisadas dentro do cenário econômico e histórico do entretenimento brasileiro. Assim, isso ajuda o leitor a entender a relevância de cada pauta publicada no portal.
        - paragraph [ref=e85]:
          - img "Portal NTVB com foco em análise de audiência e bastidores da televisão brasileira" [ref=e86]
        - heading "Sobre Nós e Nossos Princípios Editoriais" [level=3] [ref=e87]
