    - main [ref=e60]:
      - heading "Gustavo Dill – Jornalista" [level=1] [ref=e62]
      - generic [ref=e63]:
        - paragraph [ref=e64]:
          - img "Foto profissional de Gustavo Dill, jornalista NTVB e editor fundador do Portal NTVB" [ref=e65]
        - paragraph [ref=e66]:
          - text: Gustavo Dill é
          - strong [ref=e67]: jornalista NTVB
          - text: e editor fundador do Portal NTVB, veículo digital independente especializado em cobertura do mercado de televisão, rádio e entretenimento brasileiro. Com formação em Jornalismo e dedicação exclusiva ao acompanhamento do noticiário de mídia, desenvolveu expertise em análise de dados de audiência, cobertura de bastidores e contextualização histórica dos movimentos das emissoras brasileiras.
        - paragraph [ref=e68]:
          - text: Além disso, como
          - strong [ref=e69]: jornalista Gustavo Dill
          - text: ", sua missão no Portal NTVB é oferecer aos leitores informações precisas e contextualizadas sobre o universo da televisão e do rádio nacional. Logo, sua abordagem prioriza a verificação rigorosa de fontes e a distinção clara entre notícia e opinião."
        - paragraph [ref=e70]: Portanto, o trabalho do jornalista NTVB é fundamentado em princípios éticos e no compromisso com a verdade, tanto no rádio quanto na televisão.
        - heading "Especialidades do Jornalista NTVB" [level=3] [ref=e71]
        - list [ref=e72]:
          - listitem [ref=e73]:
            - strong [ref=e74]: Análise de Audiência
            - text: ": Acompanhamento diário dos índices IBOPE/Kantar das principais emissoras de TV e rádio"
          - listitem [ref=e75]:
            - strong [ref=e76]: Bastidores da TV e Rádio
            - text: ": Informações de fontes próprias sobre movimentações, contratações e mudanças de grade"
          - listitem [ref=e77]:
            - strong [ref=e78]: Contextualização Histórica
            - text: ": Análise de como eventos atuais se relacionam com a história da televisão brasileira"
          - listitem [ref=e79]:
            - strong [ref=e80]: Movimentações Estratégicas
            - text: ": Cobertura de fusões, aquisições e reposicionamento de emissoras"
        - heading "Trajetória de Gustavo Dill no Jornalismo" [level=3] [ref=e81]
        - paragraph [ref=e82]: Primeiramente, Gustavo Dill iniciou sua atuação no jornalismo de entretenimento acompanhando de perto as transformações do cenário midiático brasileiro. Em 2024, fundou o Portal NTVB com o objetivo de oferecer uma cobertura diferenciada — que fosse além da simples divulgação de notícias, focando em dados precisos, contexto histórico e análise aprofundada das tendências do mercado.
        - paragraph [ref=e83]:
          - text: Em seguida, sua abordagem jornalística prioriza a verificação de fontes, a distinção clara entre notícia e opinião, e o compromisso com informações precisas sobre o universo da televisão e do rádio brasileiro. Por conseguinte, o
          - link "Portal NTVB" [ref=e84] [cursor=pointer]:
            - /url: /sobre-nos/
          - text: nasceu da necessidade de um veículo que explicasse as movimentações do mercado de forma aprofundada.
        - paragraph [ref=e85]: Dessa forma, o jornalista Gustavo Dill continua a expandir a cobertura do Portal NTVB, inclusive para rádio e televisão.
        - heading "Filosofia de Trabalho do Jornalista Gustavo Dill" [level=3] [ref=e86]
        - paragraph [ref=e87]: “A televisão e o rádio brasileiros têm histórias ricas e complexas. Meu trabalho é contextualizar o que acontece hoje com o que já aconteceu, ajudando o leitor a entender não apenas os fatos, mas o porquê das movimentações no mercado.”
        - paragraph [ref=e88]: Consequentemente, essa filosofia guia toda a produção de conteúdo do Portal NTVB.
