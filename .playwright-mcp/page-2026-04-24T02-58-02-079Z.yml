          - text: . Para conhecer melhor quem somos, veja ainda a
          - link "página Sobre Nós" [ref=e94] [cursor=pointer]:
            - /url: /sobre-nos/
          - text: .
        - paragraph [ref=e95]: O contato Portal NTVB também é útil para quem deseja sugerir melhorias na navegação, relatar links quebrados ou indicar temas que merecem cobertura futura. Quanto mais objetiva for a mensagem, mais fácil será encaminhá-la para a área correta.
        - heading "Atendimento da redação do Portal NTVB" [level=4] [ref=e96]
        - paragraph [ref=e97]: Nosso objetivo é responder com agilidade sempre que possível, mas o prazo pode variar conforme o volume de mensagens recebidas. Pedidos de correção e contato editorial têm prioridade de análise, porque impactam diretamente a confiabilidade e a atualização do conteúdo publicado.
        - paragraph [ref=e98]: Se você acompanha o portal com frequência, use esta página sempre que precisar falar com a equipe do contato Portal NTVB de forma institucional. Assim, preservamos um histórico organizado de solicitações e mantemos um canal claro para leitores, parceiros e fontes.
