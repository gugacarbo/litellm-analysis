        - paragraph [ref=e69]: Também usamos este espaço para receber alertas sobre erros de informação, solicitações de atualização e comentários relacionados às pautas publicadas. Sempre que possível, priorizamos mensagens que ajudem a melhorar a qualidade editorial do portal e a manter o conteúdo mais útil para quem acompanha televisão, rádio, cinema e música.
