          - listitem [ref=e88]: Solicitações relacionadas à Política de Privacidade ou aos Termos de Uso
        - paragraph [ref=e89]: Quando a mensagem estiver relacionada a uma pauta específica, inclua o título do artigo, a data de publicação e o máximo de contexto possível. Isso ajuda o contato Portal NTVB a chegar mais rápido ao responsável pela apuração e reduz o tempo de resposta da redação.
        - heading "Antes de enviar sua mensagem ao Portal NTVB" [level=4] [ref=e90]
        - paragraph [ref=e91]:
          - text: Se o seu assunto estiver relacionado às regras de uso do portal ou ao tratamento de dados pessoais, consulte também a
