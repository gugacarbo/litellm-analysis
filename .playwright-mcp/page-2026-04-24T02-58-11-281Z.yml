        - 'heading "1. Política de privacidade: dados que podemos coletar" [level=3] [ref=e94]'
        - paragraph [ref=e95]: O Portal NTVB pode coletar dados fornecidos diretamente por você e informações geradas automaticamente durante o uso do site.
        - list [ref=e96]:
          - listitem [ref=e97]: Nome, e-mail e informações enviadas em formulários de contato ou cadastro.
          - listitem [ref=e98]: Conteúdos e respostas enviados em pesquisas, comentários e solicitações de atendimento.
          - listitem [ref=e99]: Dados técnicos como endereço IP, tipo de navegador, sistema operacional, idioma, localização aproximada e páginas acessadas.
        - 'heading "2. Política de privacidade: comentários e interações" [level=3] [ref=e100]'
        - paragraph [ref=e101]: Se o Portal NTVB permitir comentários ou interações públicas, podemos coletar os dados enviados no formulário, além do endereço IP e do agente de navegação do visitante para ajudar na detecção de spam e abuso.
        - paragraph [ref=e102]: Se você usa o serviço de autenticação de terceiros para comentar, a plataforma escolhida pode receber informações adicionais conforme a própria política de privacidade dela.
        - 'heading "3. Política de privacidade: cookies e tecnologias semelhantes" [level=3] [ref=e103]'
        - paragraph [ref=e104]: Usamos cookies, web beacons e recursos parecidos para entender melhor como o site é utilizado, melhorar a navegação e personalizar conteúdos e anúncios. Você pode desativar cookies nas configurações do seu navegador, mas isso pode afetar algumas funcionalidades do portal.
        - 'heading "4. Política de privacidade: formulários de contato e cadastro" [level=3] [ref=e105]'
        - paragraph [ref=e106]: Quando você envia uma mensagem por formulário, assina uma newsletter ou realiza cadastro, usamos as informações informadas apenas para responder sua solicitação, gerenciar o relacionamento com o usuário e, quando houver consentimento, enviar comunicações relevantes.
        - 'heading "5. Política de privacidade: como usamos os dados" [level=3] [ref=e107]'
        - paragraph [ref=e108]: As informações coletadas podem ser usadas para operar, manter e melhorar o Portal NTVB, além de viabilizar comunicações institucionais, análises de audiência, segurança da plataforma e oferta de conteúdos mais relevantes ao leitor.
        - list [ref=e109]:
          - listitem [ref=e110]: Personalizar conteúdos, serviços e recomendações.
          - listitem [ref=e111]: Entender melhor o comportamento de navegação e o desempenho das páginas.
          - listitem [ref=e112]: Enviar comunicações importantes, como avisos de serviço e mensagens administrativas.
          - listitem [ref=e113]: Atender dúvidas, solicitações e pedidos de atualização de dados.
        - 'heading "6. Política de privacidade: conteúdo incorporado de outros sites" [level=3] [ref=e114]'
        - paragraph [ref=e115]: Artigos do Portal NTVB podem incluir vídeos, imagens, posts ou outros conteúdos incorporados de terceiros. O conteúdo incorporado de outros sites se comporta da mesma forma como se o visitante estivesse acessando diretamente o site de origem.
        - paragraph [ref=e116]: Esses sites podem coletar dados sobre você, usar cookies, incorporar rastreamento adicional de terceiros e monitorar sua interação com o conteúdo incorporado, especialmente se você tiver conta e estiver logado no serviço de origem.
        - 'heading "7. Política de privacidade: compartilhamento com terceiros" [level=3] [ref=e117]'
        - paragraph [ref=e118]: Suas informações podem ser compartilhadas apenas quando necessário para a operação do site, cumprimento de obrigações legais ou prestação de serviços por parceiros contratados, sempre observando limites de confidencialidade e finalidade.
        - list [ref=e119]:
          - listitem [ref=e120]: Prestadores de serviços de tecnologia, comunicação, análise e suporte.
          - listitem [ref=e121]: Parceiros de publicidade e mensuração, quando aplicável.
          - listitem [ref=e122]: Autoridades competentes, em caso de exigência legal ou ordem judicial.
          - listitem [ref=e123]: Empresas relacionadas, quando necessário para administração do negócio.
        - heading "8. Informações de parceiros terceiros" [level=3] [ref=e124]
        - paragraph [ref=e125]: Podemos receber informações de plataformas de terceiros, como Google e redes sociais, quando você interage com nossos conteúdos por meio desses serviços. O tratamento desses dados também pode seguir as regras e configurações de privacidade das próprias plataformas.
        - heading "9. Publicidade e e-mails" [level=3] [ref=e126]
        - paragraph [ref=e127]: Quando você se cadastra ou preenche formulários no Portal NTVB, pode aceitar o recebimento de novidades, comunicados e conteúdos promocionais. Você pode cancelar esse envio a qualquer momento por meio do link de descadastro disponível nas mensagens enviadas.
        - heading "10. Armazenamento e segurança" [level=3] [ref=e128]
        - paragraph [ref=e129]: Os dados coletados podem ser armazenados em servidores próprios ou de parceiros contratados, no Brasil ou no exterior. Adotamos medidas razoáveis de segurança para proteger as informações contra acesso não autorizado, perda, alteração ou divulgação indevida.
        - heading "11. Seus direitos" [level=3] [ref=e130]
        - paragraph [ref=e131]: Você pode solicitar a correção, atualização, acesso, exclusão ou portabilidade dos seus dados, quando aplicável, bem como revogar o consentimento concedido anteriormente. Sempre que possível, atenderemos os pedidos dentro de um prazo razoável e conforme a legislação aplicável.
        - heading "12. Retenção de dados" [level=3] [ref=e132]
        - paragraph [ref=e133]: Mesmo após uma solicitação de exclusão, o Portal NTVB poderá manter determinados registros pelo tempo necessário para cumprir obrigações legais, regulatórias ou para resguardo de direitos, conforme a legislação brasileira vigente.
        - heading "13. Alterações nesta Política" [level=3] [ref=e134]
        - paragraph [ref=e135]: Esta Política de Privacidade pode ser atualizada a qualquer momento para refletir mudanças legais, técnicas ou operacionais. A versão mais recente sempre estará disponível nesta página.
        - heading "14. Contato" [level=3] [ref=e136]
        - paragraph [ref=e137]:
          - text: Se você tiver dúvidas sobre esta Política de Privacidade, entre em contato com a redação do Portal NTVB pelo e-mail
          - link "contato@ntvb.com.br" [ref=e138] [cursor=pointer]:
            - /url: mailto:contato@ntvb.com.br
          - text: ou acesse a nossa
          - link "página de Contato" [ref=e139] [cursor=pointer]:
            - /url: /contato/
          - text: .
